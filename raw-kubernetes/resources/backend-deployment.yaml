apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: op5-kube-backend
  labels:
    block5: optional
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      block5: optional
      app: backend
  template:
    metadata:
      labels:
        block5: optional
        app: backend
    spec:
      containers:
      - name: backend
        image: quay.io/drsylent/cubix/block5v2/optional-backend:springboot3
        ports:
        - containerPort: 8080
          name: web
